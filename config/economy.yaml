# Sample multi-good supply chain (Phase 2 demo).
seed: 42
ticks: 5
central_bank:
  taylor:
    r_star: 0.02
    pi_star: 0.02
    phi_pi: 0.5
    phi_y: 0.25
  forward_guidance: hawkish tone on price stability
entities:
  cb: { cash: -3000 }
  mill: { cash: 1000 }
  bakery: { cash: 1000 }
  hh_0: { cash: 500 }
  hh_1: { cash: 500 }
employment:
  hh_0: bakery
  hh_1: bakery
goods:
  wheat: { price: 2.0, category: production_input }
  flour: { price: 5.0, category: production_input }
  bread: { price: 12.0, category: necessity }
firms:
  mill:
    inventory:
      wheat: 200
    recipe:
      output_good: flour
      output_qty: 10
      inputs:
        wheat: 20
    governance:
      ceo: ceo_mill
      board: [b1, b2]
      evaluate_every_n_ticks: 4
  bakery:
    inventory:
      flour: 80
    recipe:
      output_good: bread
      output_qty: 8
      inputs:
        flour: 16
    governance:
      ceo: ceo_bakery
      board: [c1]
      evaluate_every_n_ticks: 4
llm:
  max_calls_per_tick: 50
# OASIS / OpenAI social-economic layer (set enabled: true and export OPENAI_API_KEY)
# oasis:
#   enabled: false
#   model: gpt-4o-mini
#   feed_max_posts: 200
#   feed_context_posts: 20
#   temperature: 0.4
#   max_new_goods_per_tick: 5
#   max_good_price: 1000000
banking:
  enabled: false
equity:
  enabled: false
social:
  edges:
    - [hh_0, hh_1]
# Optional: role archetypes, risk/ agency, goals for households and governance ids.
# Uses economy `seed` for stochastic draws unless agent_generation.base_seed is set.
